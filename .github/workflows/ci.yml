name: QA Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cypress dependencies
        working-directory: Cypress/cypress-demo
        run: npm ci

      - name: Run Cypress tests
        working-directory: Cypress/cypress-demo
        run: npx cypress run

  postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman API tests
        run: newman run "Postman/My Collection.postman_collection (1).json"
